<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aces's Lair - Workspace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/aces-lair.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background-color: var(--al-dark-surface);
        color: var(--al-text);
        font-family: "Rajdhani", sans-serif;
      }
      .repo-card {
        border: 1px solid rgba(0, 255, 255, 0.1);
        background: rgba(10, 25, 47, 0.5);
        transition: all 0.3s ease;
      }
      .repo-card:hover {
        border-color: var(--al-cyan);
        transform: translateY(-2px);
      }
      .activity-graph {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .activity-box {
        width: 12px;
        height: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
      }
      .activity-box.level-1 {
        background: rgba(0, 255, 255, 0.2);
      }
      .activity-box.level-2 {
        background: rgba(0, 255, 255, 0.5);
      }
      .activity-box.level-3 {
        background: rgba(0, 255, 255, 0.8);
      }
      .activity-box.level-4 {
        background: var(--al-cyan);
        box-shadow: 0 0 5px var(--al-cyan);
      }
      /* Edit Profile Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(2, 10, 26, 0.9);
        backdrop-filter: blur(8px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .modal-overlay.active {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background-color: var(--al-navy);
        border: 1px solid var(--al-cyan);
        box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
        width: 90%;
        max-width: 500px;
        border-radius: 4px;
        transform: scale(0.95);
        transition: transform 0.4s ease;
      }
      .modal-overlay.active .modal-content {
        transform: scale(1);
      }
      .modal-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      }
      .modal-body {
        padding: 1.5rem;
      }

      /* For the editor layout */
      #editor-main-view {
        display: flex;
        flex-grow: 1;
        overflow: hidden; /* Important for children to scroll independently */
      }
      #editor-file-tree {
        width: 250px;
        background-color: #051021; /* Slightly darker than navy for contrast */
        border-right: 1px solid rgba(0, 255, 255, 0.2);
        flex-shrink: 0;
        padding: 0.5rem;
        overflow-y: auto;
        user-select: none;
      }
      #monaco-editor-wrapper {
        flex-grow: 1;
        position: relative; /* Needed for automaticLayout to work well */
        display: flex;
        flex-direction: column;
      }
      #monaco-editor {
        flex-grow: 1;
        width: 100%;
      }
      /* AI Assistant Panel */
      #editor-ai-panel {
        width: 320px;
        flex-shrink: 0;
        background-color: #051021;
        border-left: 1px solid rgba(0, 255, 255, 0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #ai-panel-header {
        padding: 0.75rem;
        font-family: "Orbitron", sans-serif;
        color: var(--al-cyan);
        border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      #ai-chat-history {
        flex-grow: 1;
        overflow-y: auto;
        padding: 0.75rem;
        font-size: 0.85rem;
        font-family: "Consolas", "Monaco", monospace;
      }
      #ai-chat-input-area {
        display: flex;
        border-top: 1px solid rgba(0, 255, 255, 0.2);
        padding: 0.5rem;
        flex-shrink: 0;
        background-color: #020a1a;
      }
      #ai-input {
        flex-grow: 1;
        background: transparent;
        border: none;
        color: var(--al-text);
        outline: none;
        font-size: 0.85rem;
      }
      #ai-ask-btn {
        background: none;
        border: none;
        color: var(--al-cyan);
        cursor: pointer;
        font-size: 1rem;
        padding: 0 0.5rem;
        transition: color 0.3s;
      }
      #ai-ask-btn:hover {
        color: #fff;
      }

      /* Tab Styles */
      #editor-tabs {
        display: flex;
        background-color: #020a1a;
        flex-shrink: 0;
        overflow-x: auto;
        border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      }
      .editor-tab {
        padding: 0.6rem 1.2rem;
        cursor: pointer;
        border-right: 1px solid rgba(0, 255, 255, 0.1);
        background-color: #0a192f;
        color: var(--al-text);
        opacity: 0.7;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
      }
      /* AI Message Styles */
      .ai-message {
        margin-bottom: 1rem;
        line-height: 1.5;
      }
      .ai-message .sender {
        font-weight: bold;
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.75rem;
        text-transform: uppercase;
      }
      .ai-message.user .sender {
        color: var(--al-green);
      }
      .ai-message.assistant .sender {
        color: var(--al-cyan);
      }
      .ai-message .content {
        background: rgba(255, 255, 255, 0.03);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ai-message.assistant.thinking .content::after {
        content: "▋";
        animation: blink 1s infinite;
        display: inline-block;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
      }
      .editor-tab:hover {
        background-color: rgba(0, 255, 255, 0.05);
        opacity: 1;
      }
      .editor-tab.active {
        background-color: #020a1a;
        border-top: 2px solid var(--al-cyan);
        color: var(--al-cyan);
        opacity: 1;
      }
      .tab-close-btn {
        background: none;
        border: none;
        color: inherit;
        opacity: 0.6;
        cursor: pointer;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        line-height: 1;
        padding: 0;
      }
      .tab-close-btn:hover {
        background-color: rgba(255, 255, 255, 0.15);
        opacity: 1;
      }

      /* For file tree items */
      .file-tree-item {
        padding: 4px 12px;
        cursor: pointer;
        margin-bottom: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.9rem;
        color: rgba(205, 214, 246, 0.8);
      }
      .file-tree-item:hover {
        background-color: rgba(0, 255, 255, 0.05);
        color: #fff;
      }
      .file-tree-item.active {
        background-color: rgba(0, 255, 255, 0.1);
        color: var(--al-cyan);
        border-left: 2px solid var(--al-cyan);
      }
      /* For file tree header */
      #file-tree-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 0.5rem;
        margin-bottom: 0.5rem;
        border-bottom: 1px solid rgba(0, 255, 255, 0.1);
      }
      #file-tree-header .file-tree-actions button {
        background: none;
        border: none;
        color: var(--al-text);
        opacity: 0.7;
        cursor: pointer;
        padding: 0.2rem 0.4rem;
        font-size: 1rem;
      }
      #file-tree-header .file-tree-actions button:hover {
        opacity: 1;
        color: var(--al-cyan);
      }
      /* For folder items */
      .file-tree-item.folder > .folder-toggle {
        margin-right: 4px;
        display: inline-block;
        transition: transform 0.1s ease-in-out;
      }
      .file-tree-item.folder.collapsed > .folder-toggle {
        transform: rotate(-90deg);
      }
      .folder-children {
        padding-left: 1rem;
        display: block;
      }
      .folder-children.collapsed {
        display: none;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      /* For the creation input */
      .creation-input {
        background-color: var(--al-dark-surface);
        color: var(--al-text);
        border: 1px solid var(--al-cyan);
        border-radius: 3px;
        width: 100%;
        padding: 0.25rem 0.5rem;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="al-navbar">
      <div
        class="font-orbitron text-cyan"
        style="font-size: 1.5rem; font-weight: bold"
      >
        ACES'S LAIR // WORKSPACE
      </div>
      <div>
        <a href="/public-view.html" class="al-nav-link">Home</a>
        <a href="/library.html" class="al-nav-link">Library</a>
        <a href="/aces-ai.html" class="al-nav-link">Aces AI</a>
        <a
          href="/workspace.html"
          class="al-nav-link"
          style="color: var(--al-cyan)"
          >Workspace</a
        >
        <a href="/logout" class="al-nav-link">Logout</a>
      </div>
    </nav>

    <div class="container mt-3">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <!-- Sidebar -->
        <div class="md:col-span-1">
          <div class="al-card mb-4 text-center">
            <div
              class="al-avatar al-avatar-lg mb-3"
              style="width: 120px; height: 120px; font-size: 3rem"
              id="ws-avatar"
            >
              --
            </div>
            <h2
              class="font-orbitron text-cyan"
              style="font-size: 1.5rem"
              id="ws-name"
            >
              Loading...
            </h2>
            <p class="text-light opacity-70" id="ws-role">...</p>
            <button
              class="al-btn al-btn-primary-outline w-full mt-3"
              style="width: 100%"
              id="edit-profile-btn"
            >
              Edit Profile
            </button>

            <div class="mt-3 text-left">
              <div class="flex items-center mb-3">
                <i
                  class="fas fa-user-friends"
                  style="width: 24px; color: var(--al-cyan)"
                ></i>
                <span><strong class="text-white">0</strong> followers</span>
              </div>
              <div class="flex items-center mb-3">
                <i
                  class="fas fa-map-marker-alt"
                  style="width: 24px; color: var(--al-cyan)"
                ></i>
                <span id="ws-location">...</span>
              </div>
              <div class="flex items-center">
                <i
                  class="fas fa-link"
                  style="width: 24px; color: var(--al-cyan)"
                ></i>
                <a
                  href="#"
                  class="text-cyan hover:underline"
                  style="text-decoration: none"
                  id="ws-website"
                  >...</a
                >
              </div>
            </div>
          </div>

          <h3 class="font-orbitron text-white mb-3" style="font-size: 1.2rem">
            Top Languages
          </h3>
          <div class="al-card p-3 mb-4" id="ws-skills">
            <!-- Skills loaded via JS -->
          </div>
        </div>

        <!-- Main Content -->
        <div class="md:col-span-3">
          <!-- Readme / Intro -->
          <div class="al-card mb-3">
            <div class="flex justify-between items-center mb-3">
              <h3
                class="font-orbitron text-cyan"
                style="font-size: 1.2rem; margin: 0"
                id="ws-readme-title"
              >
                User / README.md
              </h3>
              <span class="al-badge al-badge-primary">Public</span>
            </div>
            <p class="mb-3" id="ws-bio">Loading bio...</p>
          </div>

          <!-- Pinned Repositories -->
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-orbitron text-white m-0" style="font-size: 1.2rem">
              Pinned Projects
            </h3>
            <button
              class="al-btn al-btn-success"
              style="padding: 0.5rem 1rem; font-size: 0.8rem"
              id="new-project-btn"
            >
              <i class="fas fa-plus"></i> New Project
            </button>
          </div>
          <div
            class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3"
            id="ws-projects"
          >
            <!-- Projects loaded via JS -->
          </div>

          <!-- Contribution Graph -->
          <h3 class="font-orbitron text-white mb-3" style="font-size: 1.2rem">
            Contribution Activity
          </h3>
          <div class="al-card p-4">
            <div class="activity-graph" id="contributionGraph"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-profile-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="font-orbitron text-cyan m-0">Edit Profile</h3>
        </div>
        <form id="edit-profile-form">
          <div class="modal-body">
            <div class="text-left mb-3">
              <label
                for="edit-fullName"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >OPERATIVE NAME</label
              >
              <input
                type="text"
                id="edit-fullName"
                name="fullName"
                class="al-input"
                required
              />
            </div>
            <div class="text-left mb-3">
              <label
                for="edit-role"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >ROLE</label
              >
              <input type="text" id="edit-role" name="role" class="al-input" />
            </div>
            <div class="text-left mb-3">
              <label
                for="edit-location"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >LOCATION</label
              >
              <input
                type="text"
                id="edit-location"
                name="location"
                class="al-input"
              />
            </div>
            <div class="text-left mb-3">
              <label
                for="edit-website"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >WEBSITE</label
              >
              <input
                type="url"
                id="edit-website"
                name="website"
                class="al-input"
              />
            </div>
            <div class="text-left mb-4">
              <label
                for="edit-bio"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >BIO / README</label
              >
              <textarea
                id="edit-bio"
                name="bio"
                class="al-input"
                rows="3"
              ></textarea>
            </div>
          </div>
          <div class="p-4 border-t border-cyan/20 flex justify-end gap-4">
            <button
              type="button"
              class="al-btn al-btn-danger"
              id="cancel-edit-btn"
            >
              Cancel
            </button>
            <button type="submit" class="al-btn al-btn-primary">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- New Project Modal -->
    <div class="modal-overlay" id="new-project-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="font-orbitron text-cyan m-0">Initialize Project</h3>
        </div>
        <form id="new-project-form">
          <div class="modal-body">
            <div class="text-left mb-3">
              <label
                for="proj-name"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >PROJECT CODENAME</label
              >
              <input
                type="text"
                id="proj-name"
                name="name"
                class="al-input"
                required
              />
            </div>
            <div class="text-left mb-3">
              <label
                for="proj-status"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >STATUS</label
              >
              <select id="proj-status" name="status" class="al-input">
                <option value="Public">Public</option>
                <option value="Private">Private</option>
                <option value="Archived">Archived</option>
              </select>
            </div>
            <div class="text-left mb-4">
              <label
                for="proj-desc"
                class="block mb-2 font-orbitron text-cyan text-sm"
                >DESCRIPTION</label
              >
              <textarea
                id="proj-desc"
                name="description"
                class="al-input"
                rows="3"
                required
              ></textarea>
            </div>
          </div>
          <div class="p-4 border-t border-cyan/20 flex justify-end gap-4">
            <button
              type="button"
              class="al-btn al-btn-danger"
              id="cancel-proj-btn"
            >
              Abort
            </button>
            <button type="submit" class="al-btn al-btn-success">
              Initialize
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Monaco Editor Container -->
    <div
      id="editor-container"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--al-dark-surface);
        z-index: 2000;
        display: none;
        flex-direction: column;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 0.5rem 1rem;
          background-color: var(--al-navy);
          border-bottom: 1px solid var(--al-cyan);
          flex-shrink: 0;
        "
      >
        <div style="display: flex; align-items: center; gap: 1rem">
          <h3 id="editor-project-name" class="font-orbitron text-cyan m-0"></h3>
          <span id="editor-save-status" class="text-sm opacity-70"></span>
        </div>
        <div style="display: flex; gap: 0.5rem">
          <button id="save-file-btn" class="al-btn al-btn-primary">
            <i class="fas fa-save"></i> Save
          </button>
          <button id="close-editor-btn" class="al-btn al-btn-danger">
            Close Editor
          </button>
        </div>
      </div>
      <div id="editor-main-view">
        <div id="editor-file-tree"></div>
        <div id="monaco-editor-wrapper">
          <div id="editor-tabs"></div>
          <div id="monaco-editor"></div>
        </div>
        <div id="editor-ai-panel">
          <div id="ai-panel-header">
            <i class="fas fa-brain"></i> A.C.E.S. Assistant
          </div>
          <div id="ai-chat-history"></div>
          <div id="ai-chat-input-area">
            <input
              type="text"
              id="ai-input"
              placeholder="Ask about code..."
              autocomplete="off"
            />
            <button id="ai-ask-btn" title="Ask">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <script>
      // --- Fetch Live Data ---
      let currentData = {};
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch("/api/workspace-data");
          if (res.status === 401) {
            window.location.href = "/login";
            return;
          }
          const data = await res.json();
          currentData = data; // Store data for the edit modal

          // Populate Profile
          document.getElementById("ws-name").textContent = data.user.fullName;
          document.getElementById("ws-readme-title").textContent =
            `${data.user.fullName} / README.md`;
          document.getElementById("ws-role").textContent = data.profile.role;
          document.getElementById("ws-location").textContent =
            data.profile.location || "Unknown";
          document.getElementById("ws-website").textContent =
            data.profile.website || "No link";
          document.getElementById("ws-website").href =
            data.profile.website || "#";
          document.getElementById("ws-bio").textContent = data.profile.bio;

          // Initials
          const initials = data.user.fullName
            .split(" ")
            .map((n) => n[0])
            .join("")
            .substring(0, 2)
            .toUpperCase();
          document.getElementById("ws-avatar").textContent = initials;

          // Populate Projects
          const projectsContainer = document.getElementById("ws-projects");
          if (data.projects.length === 0) {
            projectsContainer.innerHTML =
              '<p class="text-light opacity-50 col-span-2">No projects pinned yet.</p>';
          } else {
            projectsContainer.innerHTML = data.projects
              .map(
                (proj) => `
                        <div class="al-card repo-card" id="project-card-${proj.id}">
                            <div class="flex justify-between items-start mb-3">
                                <a href="#" class="text-cyan hover:underline" style="font-weight: bold; font-size: 1.1rem; text-decoration: none;">${proj.name}</a>
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <span class="al-badge al-badge-primary">${proj.status}</span>
                                    <button onclick="deleteProject('${proj.id}')" style="background:none; border:none; cursor:pointer; color: var(--al-danger, #ef4444); transition: opacity 0.3s;" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="text-sm opacity-80 mb-3" style="font-size: 0.9rem;">${proj.description}</p>
                            <div class="mt-4 pt-3 border-t border-cyan/10 flex justify-end gap-2">
                                <button class="al-btn al-btn-secondary-outline open-editor-btn" style="font-size: 0.8rem; padding: 0.3rem 0.6rem;" data-project-id="${proj.id}" data-project-name="${proj.name}">
                                    <i class="fas fa-code"></i> Code
                                </button>
                            </div>
                        </div>
                    `,
              )
              .join("");
          }

          // Populate Skills
          const skillsContainer = document.getElementById("ws-skills");
          if (data.skills.length === 0) {
            skillsContainer.innerHTML =
              '<p class="text-light opacity-50">No skills recorded.</p>';
          } else {
            skillsContainer.innerHTML = data.skills
              .map(
                (skill) => `
                        <div class="mb-3">
                            <div class="flex justify-between text-sm mb-3" style="font-size: 0.9rem;">
                                <span>${skill.name}</span>
                                <span>${skill.level}%</span>
                            </div>
                            <div class="al-progress" style="height: 6px;">
                                <div class="al-progress-bar" style="width: ${skill.level}%; background-color: ${skill.color || "var(--al-cyan)"};"></div>
                            </div>
                        </div>
                    `,
              )
              .join("");
          }
        } catch (e) {
          console.error("Failed to load workspace data", e);
        }
      });

      // Generate random contribution graph
      const graph = document.getElementById("contributionGraph");
      const days = 160;

      for (let i = 0; i < days; i++) {

      // --- File Tree Logic ---

      function renderFileTree(nodes, container, currentPath = "") {
        // A simple path joiner for the browser
        const joinPath = (...args) => args.filter((p) => p).join("/");

        nodes.forEach((node) => {
          const nodePath = joinPath(currentPath, node.name);

          if (node.type === "directory") {
            const folderEl = document.createElement("div");
            folderEl.className = "file-tree-item folder collapsed";
            folderEl.dataset.path = nodePath;
            folderEl.innerHTML = `<i class="fas fa-chevron-right folder-toggle"></i> <i class="fas fa-folder" style="margin-right: 8px; color: var(--al-cyan);"></i> ${node.name}`;

            const childrenContainer = document.createElement("div");
            childrenContainer.className = "folder-children collapsed";

            folderEl.addEventListener("click", (e) => {
              e.stopPropagation();
              folderEl.classList.toggle("collapsed");
              childrenContainer.classList.toggle("collapsed");
            });

            container.appendChild(folderEl);
            container.appendChild(childrenContainer);

            if (node.children) {
              renderFileTree(node.children, childrenContainer, nodePath);
            }
          } else {
            // It's a file
            const fileEl = document.createElement("div");
            fileEl.className = "file-tree-item";
            fileEl.dataset.path = nodePath;
            const iconClass = node.name.endsWith(".js")
              ? "fa-file-code"
              : "fa-file-alt";
            fileEl.innerHTML = `<i class="fas ${iconClass}" style="margin-right: 8px; color: var(--al-cyan);"></i> ${node.name}`;
            container.appendChild(fileEl);
          }
        });
      }

      function setupFileTree(files) {
        fileTreeContainer.innerHTML = ""; // Clear previous tree

        const header = document.createElement("div");
        header.id = "file-tree-header";
        header.innerHTML = `
            <span class="text-sm font-bold opacity-80">EXPLORER</span>
            <div class="file-tree-actions">
                <button id="new-file-btn" title="New File"><i class="fas fa-file-plus"></i></button>
                <button id="new-folder-btn" title="New Folder"><i class="fas fa-folder-plus"></i></button>
            </div>
        `;
        fileTreeContainer.appendChild(header);

        const treeRoot = document.createElement("div");
        fileTreeContainer.appendChild(treeRoot);

        if (!files || files.length === 0) {
          treeRoot.innerHTML = `<div class="p-2 text-sm opacity-50">No files found.</div>`;
        } else {
          renderFileTree(files, treeRoot);
        }

        document
          .getElementById("new-file-btn")
          .addEventListener("click", () => promptForNewItem("file"));
        document
          .getElementById("new-folder-btn")
          .addEventListener("click", () => promptForNewItem("directory"));
      }

      function promptForNewItem(type, relativePath = "") {
        const targetContainer = fileTreeContainer.querySelector(
          "div:not(#file-tree-header)",
        );
        if (!targetContainer) return;

        const existingInput = targetContainer.querySelector(".creation-input");
        if (existingInput) existingInput.parentElement.remove();

        const inputWrapper = document.createElement("div");
        const inputEl = document.createElement("input");
        inputEl.type = "text";
        inputEl.className = "creation-input";
        inputEl.placeholder = `Enter ${type} name...`;
        inputWrapper.appendChild(inputEl);
        targetContainer.prepend(inputWrapper);
        inputEl.focus();

        const onFinish = async () => {
          const name = inputEl.value.trim();
          inputWrapper.remove();
          if (name) {
            await createFsItem(relativePath, name, type);
          }
        };

        inputEl.addEventListener("blur", onFinish);
        inputEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter") inputEl.blur();
          if (e.key === "Escape") {
            inputEl.value = "";
            inputEl.blur();
          }
        });
      }

      async function createFsItem(relativePath, name, type) {
        try {
          const res = await fetch(`/api/create-fs-item`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              projectId: currentProjectId,
              relativePath,
              name,
              type,
            }),
          });

          if (!res.ok) {
            let errorMsg = `Request failed with status ${res.status}`;
            try {
              const errData = await res.json();
              errorMsg = errData.error || "An unknown error occurred.";
            } catch (e) {
              console.error(
                "API did not return JSON on error. Response was likely HTML.",
              );
            }
            throw new Error(errorMsg);
          }

          const result = await res.json();
          if (!result.success)
            throw new Error(result.error || "API call failed.");
          await refreshFileTree();
        } catch (error) {
          console.error(`Error creating ${type}:`, error);
          alert(`Failed to create ${type}: ${error.message}`);
        }
      }

      async function openEditor(projectId, projectName) {
        editorProjectName.textContent = `Project: ${projectName}`;
        currentProjectId = projectId;
        editorContainer.style.display = "flex";

        // --- FETCH REAL FILE SYSTEM ---
        await refreshFileTree();
        initAiAssistant();

        // Monaco Loader logic. 'require' is defined by the loader script.
        if (typeof require === "undefined") {
          console.error(
            "Monaco Editor loader script not found or failed to load.",
          );
          alert("Editor components could not be loaded.");
          return;
        }

        require.config({
          paths: {
            vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs",
          },
        });
        require(["vs/editor/editor.main"], function () {
          // --- "Extension" Setup: Advanced Language Services ---
          // This runs only once to configure the JavaScript/TypeScript language services.
          if (!languageServicesConfigured) {
            // 1. Set stricter compiler options for better error checking.
            monaco.languages.typescript.javascriptDefaults.setCompilerOptions({
              target: monaco.languages.typescript.ScriptTarget.ES2020,
              allowNonTsExtensions: true,
              moduleResolution:
                monaco.languages.typescript.ModuleResolutionKind.NodeJs,
              // This allows 'require' to work and models Node.js module resolution
            });

            // 2. A helper function to fetch and add type definitions (.d.ts files)
            // This is what powers IntelliSense for external libraries.
            const addLibrary = async (url, path) => {
              try {
                const response = await fetch(url);
                const content = await response.text();
                monaco.languages.typescript.javascriptDefaults.addExtraLib(
                  content,
                  path,
                );
                console.log(`[Editor] Added library: ${path}`);
              } catch (error) {
                console.error(
                  `[Editor] Failed to fetch library: ${url}`,
                  error,
                );
              }
            };

            // 3. Load type definitions for Node.js and Express
            // This gives us autocompletion for 'require', 'process', 'app.get', etc.
            addLibrary(
              "https://cdn.jsdelivr.net/npm/@types/node@20/index.d.ts",
              "file:///node.d.ts",
            );
            addLibrary(
              "https://cdn.jsdelivr.net/npm/@types/express@4/index.d.ts",
              "file:///express.d.ts",
            );

            languageServicesConfigured = true;
          }

          // --- CUSTOM THEME DEFINITION ---
          monaco.editor.defineTheme("aces-lair", {
            base: "vs-dark",
            inherit: true,
            rules: [
              { token: "", background: "020a1a" }, // --al-dark-surface
              { token: "comment", foreground: "6272a4", fontStyle: "italic" },
              { token: "keyword", foreground: "ff79c6" },
              { token: "string", foreground: "f1fa8c" },
              { token: "number", foreground: "bd93f9" },
              { token: "regexp", foreground: "ffb86c" },
              { token: "type", foreground: "8be9fd" },
              { token: "class", foreground: "8be9fd" },
              { token: "function", foreground: "50fa7b" },
              { token: "variable", foreground: "f8f8f2" },
              { token: "operator", foreground: "ff79c6" },
            ],
            colors: {
              "editor.background": "#020a1a",
              "editor.foreground": "#cdd6f6",
              "editorCursor.foreground": "#00ffff",
              "editor.lineHighlightBackground": "#0a192f", // --al-navy
              "editorLineNumber.foreground": "#4f5b66",
              "editor.selectionBackground": "#00ffff22",
              "editor.inactiveSelectionBackground": "#00ffff11",
              "editorIndentGuide.background": "#ffffff10",
              "editorIndentGuide.activeBackground": "#00ffff40",
            },
          });

          const initialContent =
            "// Select a file from the tree to begin editing.";
          const initialLanguage = "plaintext";

          if (monacoEditor) {
            monacoEditor.setModel(null);
            // Apply theme if editor already exists but theme wasn't set
            monaco.editor.setTheme("aces-lair");
          } else {
            monacoEditor = monaco.editor.create(
              document.getElementById("monaco-editor"),
              {
                theme: "aces-lair",
                automaticLayout: true,
                fontFamily:
                  "'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace",
                fontSize: 14,
                lineHeight: 24,
                fontLigatures: true,
                minimap: {
                  enabled: true,
                  renderCharacters: false,
                },
                cursorBlinking: "smooth",
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                guides: {
                  indentation: true,
                  bracketPairs: true,
                },
                bracketPairColorization: {
                  enabled: true,
                },
              },
            );
            // --- AUTO-SAVE LOGIC ---
            monacoEditor.onDidChangeModelContent(() => {
              // Don't do anything if the placeholder is active or no file is open
              if (!activeFile || monacoEditor.getModel()?.isPlaceholder) {
                return;
              }

              saveStatusEl.textContent = "Unsaved changes...";
              saveStatusEl.style.color = "var(--al-text)";

              // Debounce the save function
              clearTimeout(saveTimeout);
              saveTimeout = setTimeout(() => {
                saveCurrentFile();
              }, 1500); // Auto-save after 1.5 seconds of inactivity
            });
          }
          const placeholderModel = monaco.editor.createModel(
            initialContent,
            initialLanguage,
          );
          placeholderModel.isPlaceholder = true;
          monacoEditor.setModel(placeholderModel);
          monacoEditor.updateOptions({ readOnly: true });
        });
      }

      async function refreshFileTree() {
        try {
          const res = await fetch(`/api/projects/${currentProjectId}/files`);
          if (!res.ok) throw new Error("Could not fetch project files.");
          currentProjectFiles = await res.json();
          setupFileTree(currentProjectFiles);
        } catch (error) {
          console.error(error);
          setupFileTree([]);
        }
      }

      function closeEditor() {
        currentProjectId = null;
        activeFile = null;
        editorContainer.style.display = "none";

        tabsContainer.innerHTML = "";
        openFiles.forEach((file) => file.model.dispose());
        openFiles.clear();
        if (monacoEditor) {
          monacoEditor.setModel(null);
        }
        aiChatHistory.innerHTML = "";
      }

      closeEditorBtn.addEventListener("click", closeEditor);
      document
        .getElementById("save-file-btn")
        .addEventListener("click", () => saveCurrentFile());

      function getLanguageForFile(fileName) {
        if (!fileName) return "plaintext";
        const extension = "." + fileName.split(".").pop();
        if (extension === ".js") return "javascript";
        if (extension === ".json") return "json";
        if (extension === ".md") return "markdown";
        return "plaintext";
      }

      async function saveCurrentFile() {
        if (!monacoEditor || !currentProjectId || !activeFile) {
          console.warn("Save called but no file is open.");
          return;
        }

        const content = monacoEditor.getValue();
        saveStatusEl.textContent = "Saving...";
        saveStatusEl.style.color = "var(--al-text)";

        try {
          const res = await fetch("/api/save-file", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              projectId: currentProjectId,
              fileName: activeFile,
              content: content,
            }),
          });

          if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error || "Failed to save file.");
          }

          const result = await res.json();
          if (result.success) {
            saveStatusEl.textContent = "Saved!";
            setTimeout(() => (saveStatusEl.textContent = ""), 2000);
          }
        } catch (error) {
          console.error("Error saving file:", error);
          saveStatusEl.textContent = `Error: ${error.message}`;
          saveStatusEl.style.color = "var(--al-danger)";
        }
      }

      // Add Save keyboard shortcut (Ctrl+S / Cmd+S)
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "s") {

      // Use event delegation for file tree and tabs
      fileTreeContainer.addEventListener("click", (e) => {
        const fileEl = e.target.closest(".file-tree-item:not(.folder)");

      tabsContainer.addEventListener("click", (e) => {
        const tab = e.target.closest(".editor-tab");

        if (closeBtn) {

        } else if (tab) {

            openOrSwitchToFile(filePath);

      projectsContainerForEditor.addEventListener("click", (event) => {
        const editorButton = event.target.closest(".open-editor-btn");

          const projectName = editorButton.dataset.projectName;

      // This setup is simplified. The addAction method is better for context-aware shortcuts.
      // We'll keep it simple for now with a global listener.
      /*
        monacoEditor.addAction({
          id: "save-file-shortcut",
          label: "Save File",
          keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS],

      */
    </script>
    <script>
      // --- AI ASSISTANT LOGIC ---
      function addAiMessage(sender, content, isThinking = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `ai-message ${sender}`;
        if (isThinking) {
          msgDiv.classList.add("thinking");
        }

        const safeContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        msgDiv.innerHTML = `
                <span class="sender">${sender}</span>
                <div class="content">${safeContent}</div>
            `;
        aiChatHistory.appendChild(msgDiv);
        aiChatHistory.scrollTop = aiChatHistory.scrollHeight;
        return msgDiv;
      }

      async function handleAiQuery() {
        const query = aiInput.value.trim();
        if (!query) return;

        addAiMessage("user", query);
        aiInput.value = "";

        const thinkingMsg = addAiMessage("assistant", "Processing...", true);
        await new Promise((resolve) =>
          setTimeout(resolve, 800 + Math.random() * 500),
        );

        let response =
          "I'm not sure how to help with that. Ask 'help' to see a list of my capabilities.";
        const lowerQuery = query.toLowerCase();

        if (lowerQuery.startsWith("create file")) {
          const filename = query.substring("create file".length).trim();
          if (filename) {
            thinkingMsg.querySelector(".content").textContent =
              `Acknowledged. Creating file: ${filename}...`;
            // createFsItem is an existing function that handles API call and refreshes the tree
            await createFsItem("", filename, "file");
            response = `File "${filename}" has been created successfully in the root directory.`;
          } else {
            response =
              "Please specify a filename. Usage: create file <filename>";
          }
        } else if (lowerQuery.includes("list files")) {
          if (currentProjectFiles && currentProjectFiles.length > 0) {
            function buildFileListString(nodes, prefix = "") {
              let list = "";
              nodes.forEach((node, index) => {
                const isLast = index === nodes.length - 1;
                const connector = isLast ? "└── " : "├── ";
                const icon = node.type === "directory" ? "📁" : "📄";
                list += `${prefix}${connector}${icon} ${node.name}\n`;
                if (
                  node.type === "directory" &&
                  node.children &&
                  node.children.length > 0
                ) {
                  const childPrefix = prefix + (isLast ? "    " : "│   ");
                  list += buildFileListString(node.children, childPrefix);
                }
              });
              return list;
            }

            response =
              "Current project file structure:\n\n" +
              buildFileListString(currentProjectFiles);
          } else {
            response =
              "There are no files in the current project, or the file tree hasn't been loaded.";
          }
        } else if (lowerQuery.includes("help")) {
          response = `I can assist you with the following commands:
- \`help\`: Shows this list of commands.
- \`list files\`: Displays the file structure of the current project.
- \`create file <filename>\`: Creates a new empty file in the project root.
- \`explain\`: Select some code in the editor and ask me to 'explain' it.`;
        } else if (lowerQuery.includes("explain")) {
          const selection = monacoEditor.getSelection();
          const selectedText = monacoEditor
            .getModel()
            .getValueInRange(selection);

          if (!selectedText) {
            response =
              "Please select a piece of code in the editor for me to explain.";
          } else if (/\b(const|let|var)\s+.+/.test(selectedText)) {
            response =
              "This appears to be a variable declaration. It's used to store a value (like a number, string, or object) so it can be referenced later in the code.";
          } else if (/\bfunction\b|\(.*\)\s*=>/.test(selectedText)) {
            response =
              "This is a function declaration or expression. It defines a block of reusable code that can be called to perform a specific task.";
          } else if (/console\.log\(.+\)/.test(selectedText)) {
            response =
              "This is a `console.log` statement. It's a common debugging tool used to print information or variable values to the browser's developer console.";
          } else if (/\/\/.+|\/\*[\s\S]*?\*\//.test(selectedText)) {
            response =
              "This is a code comment. Comments are ignored by the program but are useful for developers to leave notes and explain what the code does.";
          } else {
            response =
              "I'm still learning to interpret complex code. This seems to be a custom piece of logic. Try selecting a more standard declaration or statement.";
          }
        } else if (lowerQuery.includes("hello") || lowerQuery.includes("hi")) {
          response =
            "Hello! I am A.C.E.S., your integrated code assistant. How can I help you with this project?";
        }

        thinkingMsg.classList.remove("thinking");
        thinkingMsg.querySelector(".content").textContent = response;
      }

      function initAiAssistant() {
        aiChatHistory.innerHTML = "";
        addAiMessage(
          "assistant",
          "A.C.E.S. assistant online. Ask 'help' to see what I can do.",
        );
      }

      aiAskBtn.addEventListener("click", handleAiQuery);
      aiInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleAiQuery();
      });
    </script>
  </body>
</html>
